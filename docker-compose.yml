service:
  database:
    image: postgres:16
    container_name: acme_postgres
    restart: unless-stopped
    ports: 
      - "5432:5432"
    environment:
     POSTGRES_USER: acme_user
     POSTGRES_PASSWORD: acme_password
     POSTGRES_DB: acme_database
  volumes:
    - postgres_data:/var/lib/postgressql/data
  heltcheck:
   test: ["CMD-SHELL", "pg_isready -U acame_user -d acme_database"]
   interval: 10s
   timeout: 5s
   restries: 5

volumes:
  postgres_data: